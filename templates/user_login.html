{% extends 'layout.html' %}

{% block title %}
    User Login
{% endblock title %}

{% block content %}
<style>
    body {
        background: linear-gradient(to right, #D2C1B6, #F9F3EF);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        color: #1B3C53;
    }

    .login-container {
        height: 100vh;
    }

    .login-card {
        background-color: #FFFFFF;
        border-left: 6px solid #456882;
        border-radius: 16px;
        padding: 2.5rem;
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.08);
        min-width: 320px;
        max-width: 450px;
        width: 100%;
    }

    .form-title {
        font-size: 1.8rem;
        font-weight: bold;
        color: #1B3C53;
    }

    .form-label {
        font-weight: 600;
        color: #456882;
        margin-bottom: 0.4rem;
    }

    .form-control {
        border-radius: 10px;
        border: 1px solid #ccc;
        padding: 0.6rem 1rem;
        font-size: 1rem;
        color: #1B3C53;
        background-color: #FAFAFA;
        transition: border-color 0.3s;
    }

    .form-control:focus {
        border-color: #456882;
        box-shadow: none;
    }

    .btn-login {
        background-color: #456882;
        color: #FFFFFF;
        font-weight: 600;
        font-size: 1rem;
        padding: 0.75rem;
        border-radius: 10px;
        border: none;
        transition: background-color 0.3s ease, color 0.3s ease;
    }

    .btn-login:hover {
        background-color: #1B3C53;
        color: #F9F3EF;
    }

    .btn-register {
        background-color: #D2C1B6;
        color: #1B3C53;
        font-weight: 600;
        font-size: 1rem;
        padding: 0.75rem;
        border-radius: 10px;
        border: none;
        transition: background-color 0.3s ease;
    }

    .btn-register:hover {
        background-color: #bfa598;
    }
</style>

<div class="container d-flex justify-content-center align-items-center login-container">
    <div class="login-card text-center">
        <h2 class="form-title mb-4">User Login</h2>
        <form method="POST" action="{{ url_for('user_login') }}">
            <div class="mb-3 text-start">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" name="username" id="username" required>
            </div>
            <div class="mb-4 text-start">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" name="password" id="password" required>
            </div>
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-login">Log In</button>
                <a href="{{ url_for('register') }}" class="btn btn-register">Create New Account</a>
            </div>
        </form>
    </div>
</div>
{% endblock content %}
