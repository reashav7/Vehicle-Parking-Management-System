{% extends 'layout.html' %}

{% block title %}
    Add Parking Lot
{% endblock title %}

{% block navbar %}
    {% include 'admin_navbar.html' %}
{% endblock navbar %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center edit-lot-container">
    <div class="edit-lot-card text-center">
        <h2 class="form-title mb-4">Add New Parking Lot</h2>
        <form method="POST" action="">
            <div class="mb-3 text-start">
                <label for="prime_location_name" class="form-label">Prime Location Name</label>
                <input type="text" class="form-control" id="prime_location_name" name="prime_location_name" value="" required>
            </div>
            <div class="mb-3 text-start">
                <label for="address" class="form-label">Address</label>
                <input type="text" class="form-control" id="address" name="address" value="" required>
            </div>
            <div class="mb-3 text-start">
                <label for="pin_code" class="form-label">PIN Code</label>
                <input type="text" class="form-control" id="pin_code" name="pin_code" value="" required>
            </div>
            <div class="mb-3 text-start">
                <label for="price_per_hour" class="form-label">Price per Hour (₹)</label>
                <input type="number" class="form-control" id="price_per_hour" name="price_per_hour" value="" min="0" required>
            </div>
            <div class="mb-4 text-start">
                <label for="maximum_spots" class="form-label">Maximum Spots</label>
                <input type="number" class="form-control" id="maximum_spots" name="maximum_spots" value="" min="1" required>
            </div>
            <div class="d-grid">
                <button type="submit" class="btn btn-save">Add Lot</button>
            </div>
        </form>
    </div>
</div>

<style>
    body {
        background: linear-gradient(to right, #D2C1B6, #F9F3EF);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        color: #1B3C53;
    }

    .edit-lot-container {
        height: 100vh;
    }

    .edit-lot-card {
        background-color: #ffffff;
        border-left: 6px solid #456882;
        border-radius: 16px;
        padding: 2.5rem;
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.08);
        min-width: 320px;
        max-width: 500px;
        width: 100%;
    }

    .form-title {
        font-size: 1.8rem;
        font-weight: bold;
        color: #1B3C53;
    }

    .form-label {
        font-weight: 600;
        color: #456882;
        margin-bottom: 0.4rem;
    }

    .form-control {
        border-radius: 10px;
        border: 1px solid #ccc;
        padding: 0.6rem 1rem;
        font-size: 1rem;
        color: #1B3C53;
        background-color: #FAFAFA;
        transition: border-color 0.3s;
    }

    .form-control:focus {
        border-color: #456882;
        box-shadow: none;
    }

    .btn-save {
        background-color: #456882;
        color: #ffffff;
        font-weight: 600;
        font-size: 1rem;
        padding: 0.75rem;
        border-radius: 10px;
        border: none;
        transition: background-color 0.3s ease, color 0.3s ease;
    }

    .btn-save:hover {
        background-color: #1B3C53;
        color: #F9F3EF;
    }
</style>
{% endblock content %}
