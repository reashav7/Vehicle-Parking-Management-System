<!-- searchbar.html -->

<div class="search-container d-flex flex-column align-items-center">
  <form method="GET" action="{{ url_for('user_dashboard', user_id=user_id) }}" class="d-flex w-100 justify-content-center">
    <input type="text" name="query" placeholder="Search for location, area, or PIN..." class="search-input">
    <button type="submit" class="btn btn-search">
      <i class="fa-solid fa-magnifying-glass"></i> Search
    </button>
  </form>
</div>

<style>
  .search-container {
    background-color: #1B3C53;
    padding: 1rem 1.5rem;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    margin-bottom: 2rem;
  }

  .search-input {
    background-color: #ffffff;
    border: 2px solid #456882;
    border-radius: 12px;
    padding: 0.5rem 1rem;
    font-size: 1rem;
    width: 100%;
    max-width: 500px;
    color: #1B3C53;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  .search-input::placeholder {
    color: #999;
  }

  .search-input:focus {
    border-color: #456882;
    box-shadow: 0 0 0 3px rgba(69, 104, 130, 0.2);
  }

  .btn-search {
    background-color: #D2C1B6;
    border: none;
    border-radius: 12px;
    padding: 0.5rem 1.2rem;
    margin-left: 0.5rem;
    font-weight: 600;
    color: #1B3C53;
    transition: background-color 0.3s ease, color 0.3s;
  }

  .btn-search:hover {
    background-color: #bda99d;
    color: #ffffff;
  }

  .btn-search i {
    margin-right: 5px;
    color: #1B3C53;
  }
</style>
