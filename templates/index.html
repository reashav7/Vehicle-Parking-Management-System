{% extends 'layout.html' %}

{% block title %}
    Vehicle Parking App
{% endblock title %}

{% block content %}
<style>
    body {
        background: linear-gradient(to right, #D2C1B6, #F9F3EF);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        color: #1B3C53;
    }

    .landing-container {
        height: 100vh;
    }

    .custom-card {
        background-color: #FFFFFF;
        border-left: 6px solid #456882;
        border-radius: 16px;
        padding: 2.5rem;
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.08);
        min-width: 320px;
        max-width: 400px;
        width: 100%;
    }

    .app-title {
        font-size: 2rem;
        font-weight: 700;
        color: #1B3C53;
    }

    .text-muted {
        color: #456882;
        font-size: 1rem;
    }

    .btn-custom {
        font-size: 1.1rem;
        padding: 0.75rem;
        border-radius: 12px;
        border: none;
        font-weight: 600;
    }

    .btn-user {
        background-color: #456882;
        color: #FFFFFF;
    }

    .btn-user:hover {
        background-color: #1B3C53;
        color: #F9F3EF;
    }

    .btn-admin {
        background-color: #D2C1B6;
        color: #1B3C53;
    }

    .btn-admin:hover {
        background-color: #bfa598;
        color: #1B3C53;
    }
</style>

<div class="container d-flex justify-content-center align-items-center landing-container">
    <div class="custom-card text-center">
        <h2 class="app-title mb-4">Vehicle Parking App</h2>
        <p class="text-muted mb-4">Please select your login type</p>
        <div class="d-grid gap-3">
            <a href="{{ url_for('user_login') }}" class="btn btn-custom btn-user">User Login</a>
            <a href="{{ url_for('admin_login') }}" class="btn btn-custom btn-admin">Admin Login</a>
        </div>
    </div>
</div>
{% endblock content %}
