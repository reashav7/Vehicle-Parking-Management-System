{% extends 'layout.html' %}

{% block title %}
    Release Parking Spot
{% endblock title %}

{% block navbar %}
    {% include 'user_navbar.html' %}
{% endblock navbar %}

{% block content %}
<div class="container book-container d-flex justify-content-center align-items-center">
    <div class="book-card text-center">
        <h2 class="form-title mb-4">Release Parking Spot</h2>
        <form method="POST" action="">
            <div class="mb-3 text-start">
                <label class="form-label">Lot Name</label>
                <input type="text" class="form-control" name="lot_name" value="{{ lot.prime_location_name }}" readonly>
            </div>
            <div class="mb-3 text-start">
                <label class="form-label">Lot ID</label>
                <input type="text" class="form-control" name="lot_id" value="{{ lot.id }}" readonly>
            </div>
            <div class="mb-3 text-start">
                <label class="form-label">Spot ID</label>
                <input type="text" class="form-control" name="spot_id" value="{{ spot.id }}" readonly>
            </div>
            <div class="mb-3 text-start">
                <label class="form-label">Vehicle Number</label>
                <input type="text" class="form-control" name="vehicle_number" value="{{ reservation.vehicle_number }}" readonly>
            </div>
            <div class="mb-3 text-start">
                <label class="form-label">Start Time</label>
                <input type="text" class="form-control" name="start_time" value="{{ reservation.start_time.strftime('%d-%m-%Y %I:%M %p') }}" readonly>
            </div>
            <div class="mb-3 text-start">
                <label class="form-label">End Time</label>
                <input type="text" class="form-control" name="end_time" value="{{ simulated_end_time.strftime('%d-%m-%Y %I:%M %p') }}" readonly>
            </div>
            <div class="mb-3 text-start">
                <label class="form-label">Price per Hour</label>
                <input type="text" class="form-control" name="price_per_hour" value="₹{{ lot.price_per_hour }}" readonly>
            </div>
            <div class="mb-3 text-start">
                <label class="form-label">Duration</label>
                <input type="text" class="form-control" name="duration" value="{{ duration_str }}" readonly>
            </div>
            <div class="mb-4 text-start">
                <label class="form-label">Total Cost</label>
                <input type="text" class="form-control" name="total_cost" value="₹{{ '%.2f' % total_cost }}" readonly>
            </div>
            <div class="d-grid">
                <button type="submit" class="btn btn-release">Confirm Release</button>
            </div>
        </form>
    </div>
</div>

<style>
    body {
        background: linear-gradient(to right, #D2C1B6, #F9F3EF);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        color: #1B3C53;
        margin: 0;
        padding: 0;
    }

    .book-container {
        min-height: 100vh;
        padding-top: 2rem;
        padding-bottom: 2rem;
    }

    .book-card {
        background-color: #FFFFFF;
        border-left: 6px solid #456882;
        border-radius: 16px;
        padding: 2.5rem;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 500px;
    }

    .form-title {
        font-size: 1.75rem;
        font-weight: 700;
        color: #1B3C53;
    }

    .form-label {
        font-weight: 600;
        color: #456882;
    }

    .form-control {
        border-radius: 10px;
        border: 1px solid #ccc;
        padding: 0.6rem 1rem;
    }

    .btn-release {
        background-color: #F9F3EF;
        color: #b30000;
        font-weight: 600;
        font-size: 1rem;
        padding: 0.75rem;
        border-radius: 10px;
        border: 1px solid #f2d6d6;
        transition: background-color 0.3s ease, color 0.3s ease;
    }

    .btn-release:hover {
        background-color: #f2c5c5;
        color: #b30000;
    }

    @media (max-width: 576px) {
        .book-card {
            padding: 1.75rem;
        }

        .form-title {
            font-size: 1.5rem;
        }
    }
</style>
{% endblock content %}
