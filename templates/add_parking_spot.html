{% extends 'layout.html' %}

{% block title %}Add Parking Spots{% endblock title %}

{% block navbar %}
    {% include 'admin_navbar.html' %}
{% endblock navbar %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center add-spot-container">
    <div class="add-spot-card text-center">
        <h2 class="form-title mb-4">Add Parking Spot(s)</h2>
        <form method="POST">
            <div class="mb-3 text-start">
                <label for="num_spots" class="form-label">How many new spots do you want to add?</label>
                <input type="number" class="form-control" id="num_spots" name="num_spots" placeholder="Enter number of spots" min="1" required>
            </div>
            <div class="d-grid">
                <button type="submit" class="btn btn-add">Add Spot(s)</button>
            </div>
        </form>
        <a href="{{ url_for('view_parking_spots', lot_id=parking_lot.id) }}" class="btn btn-back mt-3">Back to Parking Lot</a>
    </div>
</div>

<style>
    body {
        background: linear-gradient(to right, #D2C1B6, #F9F3EF);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        color: #1B3C53;
    }

    .add-spot-container {
        height: 100vh;
    }

    .add-spot-card {
        background-color: #FFFFFF;
        border-left: 6px solid #456882;
        border-radius: 16px;
        padding: 2.5rem;
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.08);
        min-width: 320px;
        max-width: 500px;
        width: 100%;
    }

    .form-title {
        font-size: 1.8rem;
        font-weight: bold;
        color: #1B3C53;
    }

    .form-label {
        font-weight: 600;
        color: #456882;
        margin-bottom: 0.4rem;
    }

    .form-control {
        border-radius: 10px;
        border: 1px solid #ccc;
        padding: 0.6rem 1rem;
        font-size: 1rem;
        color: #1B3C53;
        background-color: #FAFAFA;
        transition: border-color 0.3s;
    }

    .form-control:focus {
        border-color: #456882;
        box-shadow: none;
    }

    .btn-add {
        background-color: #D2C1B6;
        color: #1B3C53;
        font-weight: 600;
        font-size: 1rem;
        padding: 0.75rem;
        border-radius: 10px;
        border: none;
    }

    .btn-add:hover {
        background-color: #c2b0a3;
    }

    .btn-back {
        background-color: #456882;
        color: #FFFFFF;
        padding: 0.5rem 1rem;
        border-radius: 10px;
        text-decoration: none;
        font-weight: 600;
        display: inline-block;
        transition: background-color 0.3s ease;
    }

    .btn-back:hover {
        background-color: #1B3C53;
        color: #FFFFFF;
    }
</style>
{% endblock content %}
