{% extends 'layout.html' %}

{% block title %}
    Book Parking Spot
{% endblock title %}

{% block navbar %}
    {% include 'user_navbar.html' %}
{% endblock navbar %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center book-container">
    <div class="book-card text-center">
        <h2 class="form-title mb-4">Book Parking Spot</h2>
        <form method="POST" action="">
            <div class="mb-3 text-start">
                <label class="form-label">Lot Name</label>
                <input type="text" class="form-control" name="lot_name" value="{{ lot.prime_location_name }}" readonly>
            </div>
            <div class="mb-3 text-start">
                <label class="form-label">Lot ID</label>
                <input type="text" class="form-control" name="lot_id" value="{{ lot.id }}" readonly>
            </div>
            <div class="mb-3 text-start">
                <label for="spot_id" class="form-label">Spot ID</label>
                <input type="number" class="form-control" id="spot_id" name="spot_id"
                       value="{{ spot.id if spot else 'N/A' }}" readonly>
            </div>
            <div class="mb-3 text-start">
                <label class="form-label">Your Name</label>
                <input type="text" class="form-control" name="user_name" value="{{ user.name }}" readonly>
            </div>
            <div class="mb-4 text-start">
                <label for="vehicle_number" class="form-label">Vehicle Number</label>
                <input type="text" class="form-control" id="vehicle_number" name="vehicle_number" placeholder="e.g., WB06A1234" required>
            </div>
            <div class="d-grid">
                <button type="submit" class="btn btn-save">Confirm Booking</button>
            </div>
        </form>
    </div>
</div>

<style>
    body {
        background-color: #F9F3EF;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        color: #1B3C53;
    }

    .book-container {
        height: 100vh;
    }

    .book-card {
        background-color: #FFFFFF;
        border-left: 6px solid #456882;
        border-radius: 16px;
        padding: 2rem;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
        min-width: 320px;
        max-width: 500px;
        width: 100%;
    }

    .form-title {
        font-size: 1.75rem;
        font-weight: bold;
        color: #1B3C53;
    }

    .form-label {
        font-weight: 600;
        color: #1B3C53;
    }

    .form-control {
        border-radius: 10px;
        border: 1px solid #D2C1B6;
        background-color: #FDFDFD;
        color: #1B3C53;
    }

    .form-control:focus {
        border-color: #456882;
        box-shadow: 0 0 0 0.15rem rgba(69, 104, 130, 0.25);
    }

    .btn-save {
        background-color: #456882;
        color: #fff;
        font-size: 1.05rem;
        padding: 0.75rem;
        border-radius: 12px;
        font-weight: 600;
        border: none;
    }

    .btn-save:hover {
        background-color: #36556b;
        color: #fff;
    }
</style>
{% endblock content %}
